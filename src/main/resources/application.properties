spring.application.name=BadWalletAPIPaymentService

server.port=8080

spring.datasource.url=jdbc:h2:mem:badwalletdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/api/h2-console


spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true


spring.security.basic.enabled=false
security.basic.enabled=false

payment.service.url=http://localhost:8081


wallet.withdraw.fee.rate=0.01
wallet.withdraw.fee.max=5000
